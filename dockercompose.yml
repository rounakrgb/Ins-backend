version: "3.9"

services:
  web:
    build: ./web
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:password123@db:5432/mydb
      REDIS_URL: redis://redis:6379  

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine

volumes:
  db-data: